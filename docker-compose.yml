# ─────────────────────────────────────────────
# JetNexus AI: Docker Compose (Development)
# ─────────────────────────────────────────────
# Usage: make dev  OR  docker compose up -d
# ─────────────────────────────────────────────

version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jetnexus-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jetnexus}
      POSTGRES_USER: ${POSTGRES_USER:-jetnexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err - set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jetnexus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jetnexus-network

  # ── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jetnexus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jetnexus-network

  # ── Zookeeper (Kafka dependency) ───────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: jetnexus-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - jetnexus-network

  # ── Apache Kafka ───────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: jetnexus-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - jetnexus-network

  # ── Decision Engine (Python/FastAPI) ───────
  decision-engine:
    build:
      context: ./services/decision-engine
      dockerfile: Dockerfile
    container_name: jetnexus-decision-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-jetnexus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jetnexus}
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - NOTIFICATION_SERVICE_URL=http://notification-service:8001
      - APP_ENV=development
      - APP_DEBUG=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/decision-engine:/app
    networks:
      - jetnexus-network

  # ── Notification Service (Python) ──────────
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: jetnexus-notification
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - APP_ENV=development
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./services/notification-service:/app
    networks:
      - jetnexus-network

  # ── Ingestion Service (Go) ─────────────────
  ingestion-service:
    build:
      context: ./services/ingestion-service
      dockerfile: Dockerfile
    container_name: jetnexus-ingestion
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - API_KEY=${API_KEY:?err - set API_KEY in .env}
      - PORT=8002
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./services/ingestion-service:/app
    networks:
      - jetnexus-network

  # ── Frontend (Next.js) ─────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jetnexus-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - decision-engine
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - jetnexus-network

# ── Volumes ──────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  zookeeper_data:
    driver: local
  kafka_data:
    driver: local

# ── Networks ─────────────────────────────────
networks:
  jetnexus-network:
    driver: bridge
    name: jetnexus-network
